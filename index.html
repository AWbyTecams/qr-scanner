<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>QR‑Scanner</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        font-family: Arial, sans-serif;
        margin: 20px;
        background: #f4f4f4;
    }
    h2 { margin-bottom: 10px; }
    #reader {
        width: 100%;
        max-width: 400px;
        margin-bottom: 20px;
    }
    table {
        width: 100%;
        border-collapse: collapse;
        background: white;
    }
    th, td {
        border: 1px solid #ccc;
        padding: 6px;
        text-align: left;
    }
    #manualButton {
        margin-left: 10px;
        padding: 8px 12px;
        font-size: 16px;
    }
</style>

<!-- Beep-Sound -->
<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

<!-- QR Scanner Library -->
<script src="https://unpkg.com/html5-qrcode"></script>
</head>

<body>

<h2>QR‑Scanner → CSV</h2>

<label>
    <input type="checkbox" id="manualToggle">
    Manuell auslösen
</label>

<button id="manualButton" style="display:none;">Scan jetzt speichern</button>

<div id="reader"></div>

<table id="table">
    <thead>
        <tr>
            <th>Timestamp</th>
            <th>Feeder</th>
            <th>Lagerindex</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<br>
<button onclick="downloadCSV()">CSV herunterladen</button>

<script>
let results = [];
let lastScan = "";
let currentFeeder = "";
let currentLager = "";
let manualMode = false;
let pendingScan = "";

// Umschalter Automatik/Manuell
document.getElementById("manualToggle").addEventListener("change", (e) => {
    manualMode = e.target.checked;
    document.getElementById("manualButton").style.display = manualMode ? "inline-block" : "none";
});

// Manuell speichern
document.getElementById("manualButton").addEventListener("click", () => {
    if (pendingScan !== "") {
        processScan(pendingScan);
        pendingScan = "";
    }
});

// Haupt-Scan-Funktion
function onScanSuccess(decodedText) {
    if (manualMode) {
        pendingScan = decodedText;
        document.getElementById("beep").play();
        return;
    }
    processScan(decodedText);
}

// Gemeinsame Verarbeitung
function processScan(decodedText) {
    if (decodedText === lastScan) return;
    lastScan = decodedText;
    document.getElementById("beep").play();

    // 1. Feeder erfassen
    if (currentFeeder === "") {
        currentFeeder = decodedText;

        const row = document.createElement("tr");
        row.innerHTML = `<td>Feeder gescannt</td><td>${decodedText}</td><td>-</td>`;
        document.querySelector("#table tbody").appendChild(row);

        setTimeout(() => { lastScan = ""; }, 1000);
        return;
    }

    // 2. Lagerindex erfassen
    if (currentLager === "") {
        currentLager = decodedText;

        const timestamp = new Date().toISOString();
        results.push({
            timestamp,
            feeder: currentFeeder,
            lager: currentLager
        });

        const row = document.createElement("tr");
        row.innerHTML = `<td>${timestamp}</td><td>${currentFeeder}</td><td>${currentLager}</td>`;
        document.querySelector("#table tbody").appendChild(row);

        currentFeeder = "";
        currentLager = "";

        setTimeout(() => { lastScan = ""; }, 1000);
        return;
    }
}

// CSV Export
function downloadCSV() {
    let csv = "Timestamp;Feeder;Lagerindex\n";
    results.forEach(r => {
        csv += `${r.timestamp};${r.feeder};${r.lager}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "scan_ergebnisse.csv";
    a.click();
}

// QR Scanner starten
const html5QrCode = new Html5Qrcode("reader");
html5QrCode.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
);
</script>

</body>
</html>
