<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>QR-Scanner → CSV</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
body { font-family: Arial; margin: 20px; }
#reader { width: 300px; margin-bottom: 20px; }
table { border-collapse: collapse; width: 100%; margin-top: 20px; }
td, th { border: 1px solid #ccc; padding: 8px; }
</style>
</head>
<body>

<audio id="beep" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>

    
<h2>QR-Scanner → CSV</h2>

<div id="reader"></div>

<h3>Gescannt:</h3>
<table id="table">
<thead>
<tr><th>Zeitstempel</th><th>Seriennummer</th></tr>
</thead>
<tbody></tbody>
</table>

<button onclick="downloadCSV()">CSV herunterladen</button>

<script>
let results = [];
let lastScan = "";
let currentFeeder = "";
let currentLager = "";

function onScanSuccess(decodedText) {
    if (decodedText === lastScan) return; 
    lastScan = decodedText;
    document.getElementById("beep").play();

    // 1. Wenn noch kein Feeder gesetzt ist → Feeder speichern
    if (currentFeeder === "") {
        currentFeeder = decodedText;

        const row = document.createElement("tr");
        row.innerHTML = `<td>Feeder gescannt</td><td>${decodedText}</td>`;
        document.querySelector("#table tbody").appendChild(row);

        setTimeout(() => { lastScan = ""; }, 1000);
        return;
    }

    // 2. Wenn Feeder gesetzt ist → Lagerindex speichern
    if (currentLager === "") {
        currentLager = decodedText;

        const timestamp = new Date().toISOString();
        results.push({
            timestamp,
            feeder: currentFeeder,
            lager: currentLager
        });

        const row = document.createElement("tr");
        row.innerHTML = `<td>${timestamp}</td><td>${currentFeeder}</td><td>${currentLager}</td>`;
        document.querySelector("#table tbody").appendChild(row);

        // Reset für nächsten Datensatz
        currentFeeder = "";
        currentLager = "";

        setTimeout(() => { lastScan = ""; }, 2000);
        return;
    }
}



function downloadCSV() {
    let csv = "Timestamp;Feeder;Lagerindex\n";
    results.forEach(r => {
        csv += `${r.timestamp};${r.feeder};${r.lager}\n`;
    });

    const blob = new Blob([csv], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "scan_ergebnisse.csv";
    a.click();
}


new Html5Qrcode("reader").start(
    { facingMode: "environment" },
    { fps: 10, qrbox: 250 },
    onScanSuccess
);
</script>

</body>
</html>
